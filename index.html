<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#147a7e">
  <title>专升本题库训练中心</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css?v=20260625-mobile-ab-v1">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Question Bank</p>
        <h1>专升本题库训练中心</h1>
      </div>
      <div class="top-actions">
        <button class="icon-button" id="reviewQueueButton" type="button" title="只刷今天该复习的题" aria-label="今日复习队列">
          <span aria-hidden="true">↻</span><span>今日复习</span>
        </button>
        <button class="icon-button secondary" id="studyModeButton" type="button" title="切换单题学习模式" aria-label="单题模式">
          <span aria-hidden="true">□</span><span>单题模式</span>
        </button>
        <button class="icon-button secondary" id="autoHideMasteredButton" type="button" title="连续做对3次的题自动隐藏" aria-label="隐藏熟练题">
          <span aria-hidden="true">✓</span><span>隐藏熟练题</span>
        </button>
        <button class="icon-button secondary" id="timerButton" type="button" title="倒计时刷题" aria-label="倒计时刷题">
          <span aria-hidden="true">⏱</span><span>倒计时</span>
        </button>
        <button class="icon-button" id="sampleButton" type="button" title="载入示例题" aria-label="载入示例题">
          <span aria-hidden="true">＋</span><span>示例</span>
        </button>
        <button class="icon-button" id="stressButton" type="button" title="载入1万题演示" aria-label="载入1万题演示">
          <span aria-hidden="true">≡</span><span>1万演示</span>
        </button>
        <button class="icon-button" id="importButton" type="button" title="导入题库" aria-label="导入题库">
          <span aria-hidden="true">↥</span><span>导入</span>
        </button>
        <button class="icon-button secondary" id="exportButton" type="button" title="导出题库" aria-label="导出题库">
          <span aria-hidden="true">↧</span><span>导出</span>
        </button>
      </div>
    </header>

    <input id="importInput" type="file" accept=".json,application/json" hidden>

    <header class="mobile-app-top" aria-label="手机端顶部导航">
      <div>
        <p id="mobileScreenTitle" class="mobile-screen-title">刷题</p>
        <strong>专升本题库</strong>
      </div>
      <div class="mobile-top-actions">
        <button class="mobile-pill" id="mobileFilterToggle" type="button">筛选</button>
        <button class="mobile-pill timer-pill" id="mobileTimerPill" type="button">25:00</button>
      </div>
    </header>

    <section class="toolbar" aria-label="题库筛选">
      <label class="field search-field">
        <span>搜索</span>
        <input id="searchInput" type="search" placeholder="题号、考点、关键词">
      </label>
      <label class="field">
        <span>科目</span>
        <select id="subjectFilter">
          <option value="all">全部</option>
        </select>
      </label>
      <label class="field">
        <span>章节</span>
        <select id="chapterFilter">
          <option value="all">全部</option>
        </select>
      </label>
      <label class="field">
        <span>状态</span>
        <select id="statusFilter">
          <option value="all">全部</option>
          <option value="dueReview">今日复习</option>
          <option value="weakChapter">薄弱章节</option>
          <option value="mastered">熟练题</option>
          <option value="unseen">未做</option>
          <option value="wrong">最近做错</option>
          <option value="correct">最近做对</option>
          <option value="wrongBook">已进错题本</option>
        </select>
      </label>
      <label class="field">
        <span>难度</span>
        <select id="difficultyFilter">
          <option value="all">全部</option>
          <option value="1">难度 1</option>
          <option value="2">难度 2</option>
          <option value="3">难度 3</option>
          <option value="4">难度 4</option>
          <option value="5">难度 5</option>
        </select>
      </label>
    </section>

    <section class="stats-grid" aria-label="统计">
      <div class="stat-tile">
        <span>题库</span>
        <strong id="totalCount">0</strong>
      </div>
      <div class="stat-tile">
        <span>当前筛选</span>
        <strong id="filteredCount">0</strong>
      </div>
      <div class="stat-tile">
        <span>最近做错</span>
        <strong id="wrongCount">0</strong>
      </div>
      <div class="stat-tile">
        <span>已进错题本</span>
        <strong id="wrongBookCount">0</strong>
      </div>
      <div class="stat-tile">
        <span>今日复习</span>
        <strong id="dueReviewCount">0</strong>
      </div>
      <div class="stat-tile">
        <span>连续打卡</span>
        <strong id="streakCount">0</strong>
      </div>
      <div class="stat-tile">
        <span>今日完成</span>
        <strong id="dailyProgressCount">0/80</strong>
      </div>
      <div class="stat-tile">
        <span>熟练题</span>
        <strong id="masteredCount">0</strong>
      </div>
    </section>

    <section class="dashboard-panel" id="dashboardPanel" aria-label="学习分析"></section>


    <section class="mobile-me-panel" id="mobileMePanel" aria-label="我的">
      <div class="mobile-me-card">
        <p class="eyebrow">Data</p>
        <h2>题库与备份</h2>
        <p class="mobile-me-muted">当前题库 <strong id="mobileTotalCount">0</strong> 道，当前筛选 <strong id="mobileFilteredCount">0</strong> 道。</p>
        <div class="mobile-me-grid">
          <button class="primary-button" id="mobileImportButton" type="button">导入题库</button>
          <button class="secondary-button" id="mobileExportButton" type="button">导出备份</button>
          <button class="secondary-button" id="mobileSampleButton" type="button">示例题</button>
          <button class="secondary-button" id="mobileStressButton" type="button">1万演示</button>
        </div>
      </div>
      <div class="mobile-me-card">
        <p class="eyebrow">Settings</p>
        <h2>学习设置</h2>
        <label class="mobile-setting-row">
          <span>每日目标</span>
          <input id="mobileDailyGoalInput" type="number" min="10" max="500" step="10" value="80">
        </label>
        <div class="mobile-me-grid">
          <button class="secondary-button" id="mobileMeStudyModeButton" type="button">单题模式</button>
          <button class="secondary-button" id="mobileMeAutoHideMasteredButton" type="button">隐藏熟练题</button>
          <button class="secondary-button" id="mobileMeTimerButton" type="button">开始倒计时</button>
          <button class="secondary-button" id="mobileBackupButton" type="button">立即备份</button>
        </div>
      </div>
    </section>

    <main class="workspace">
      <section class="list-panel" aria-label="题目列表">
        <div class="panel-head">
          <div>
            <p class="eyebrow">List</p>
            <h2>题目</h2>
          </div>
          <div class="pager">
            <button id="prevPageButton" type="button" class="small-button" aria-label="上一页">‹</button>
            <span id="pageInfo">1 / 1</span>
            <button id="nextPageButton" type="button" class="small-button" aria-label="下一页">›</button>
          </div>
        </div>
        <div class="questions-list" id="questionsList" aria-live="polite"></div>
      </section>

      <section class="detail-panel" id="detailPanel" aria-label="题目详情">
        <div class="empty-detail">
          <p class="eyebrow">Detail</p>
          <h2>选择一道题开始</h2>
          <p>答案和解析会先隐藏，检查时再打开。</p>
        </div>
      </section>
    </main>
  </div>

  <nav class="mobile-tabbar" aria-label="手机端底部导航">
    <button class="mobile-tab-button active" type="button" data-mobile-tab="quiz"><span>刷题</span></button>
    <button class="mobile-tab-button" type="button" data-mobile-tab="review"><span>复习</span></button>
    <button class="mobile-tab-button" type="button" data-mobile-tab="stats"><span>统计</span></button>
    <button class="mobile-tab-button" type="button" data-mobile-tab="me"><span>我的</span></button>
  </nav>

  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(', '\\)'], ['$', '$']], displayMath: [['\\[', '\\]']] },
      chtml: { scale: 1 }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <script src="core.js"></script>
  <script src="question-bank-data.js?v=20260625-mobile-ab-v1"></script>
  <script src="app.js?v=20260625-mobile-ab-v1"></script>
</body>
</html>
